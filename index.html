<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEAINT AI Demo Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

  <style>
    body { background:#030303; color:white; font-family: Inter, system-ui, sans-serif; }
    .glass { background:rgba(20,20,24,.72); border:1px solid rgba(255,255,255,.08); backdrop-filter: blur(18px); }
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 80px 80px;
    }
    textarea, input, select { outline:none; }
  </style>
</head>

<body class="min-h-screen grid-bg overflow-x-hidden">
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-[-10%] left-[20%] w-[500px] h-[500px] bg-blue-600/20 blur-[150px] rounded-full"></div>
    <div class="absolute bottom-[-10%] right-[10%] w-[500px] h-[500px] bg-violet-600/20 blur-[150px] rounded-full"></div>
  </div>

  <header class="h-16 border-b border-white/10 bg-black/60 backdrop-blur-xl flex items-center justify-between px-6 sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-violet-500 flex items-center justify-center">
        <iconify-icon icon="solar:magic-stick-3-linear"></iconify-icon>
      </div>
      <div>
        <h1 class="font-semibold tracking-tight">SEAINT AI Demo Builder</h1>
        <p class="text-xs text-zinc-500">Prompt-to-HTML website generator</p>
      </div>
    </div>

    <button onclick="downloadHTML()" class="bg-white text-black text-sm px-4 py-2 rounded-lg font-semibold hover:bg-zinc-200">
      Download HTML
    </button>
  </header>

  <main class="relative z-10 grid lg:grid-cols-[430px_1fr] gap-6 p-6">

    <section class="glass rounded-2xl p-5 h-fit sticky top-24">
      <div class="mb-5">
        <h2 class="text-xl font-semibold tracking-tight">Generate Real Website Code</h2>
        <p class="text-sm text-zinc-400 mt-1">Type what the client needs. AI returns a unique static HTML website.</p>
      </div>

      <div class="space-y-4">
        <textarea id="prompt" rows="9" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-sm resize-none" placeholder="Example: Create a luxury futuristic website for a chiropractor in Murfreesboro. Include hero, services, testimonials, AI receptionist section, booking CTA, and premium dark design."></textarea>

        <div class="grid grid-cols-2 gap-3">
          <button onclick="generateAIWebsite()" id="generateBtn" class="bg-white text-black rounded-xl py-3 text-sm font-semibold hover:bg-zinc-200">
            Generate
          </button>

          <button onclick="copyHTML()" class="bg-zinc-900 border border-white/10 rounded-xl py-3 text-sm font-semibold hover:bg-zinc-800">
            Copy HTML
          </button>
        </div>

        <button onclick="fillExample()" class="w-full bg-blue-500/10 border border-blue-400/20 text-blue-200 rounded-xl py-3 text-sm font-semibold hover:bg-blue-500/20">
          Use Example Prompt
        </button>

        <p id="status" class="text-xs text-zinc-500 pt-2"></p>
      </div>
    </section>

    <section class="glass rounded-2xl overflow-hidden min-h-[850px]">
      <div class="h-12 border-b border-white/10 bg-black/50 flex items-center justify-between px-4">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-red-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-yellow-500/70"></span>
          <span class="w-3 h-3 rounded-full bg-green-500/70"></span>
        </div>
        <p class="text-xs text-zinc-500">Live Preview</p>
      </div>

      <iframe id="preview" class="w-full h-[900px] bg-black"></iframe>
    </section>
  </main>

<script>
let generatedHTML = "";

function fillExample(){
  document.getElementById("prompt").value =
`Create a luxury futuristic website for a chiropractor in Murfreesboro called Elite Spine & Wellness.

Style:
- Dark obsidian background
- Blue/violet glow
- Premium medical authority
- Glassmorphism cards
- High-end spacing and typography

Sections:
- Hero with strong CTA
- Services for back pain, neuropathy, posture correction
- Doctor credibility section
- AI receptionist section
- Testimonials
- Booking CTA
- Footer

Make it feel different from a normal template.`;
}

async function generateAIWebsite(){
  const prompt = document.getElementById("prompt").value.trim();
  const status = document.getElementById("status");
  const btn = document.getElementById("generateBtn");

  if(!prompt){
    status.innerText = "Add a prompt first.";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Generating...";
  status.innerText = "Generating website code...";

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();

    if(!response.ok){
      throw new Error(data.error || "Generation failed");
    }

    generatedHTML = data.html;
    document.getElementById("preview").srcdoc = generatedHTML;
    status.innerText = "Website generated successfully.";

  } catch (error) {
    status.innerText = error.message;
  } finally {
    btn.disabled = false;
    btn.innerText = "Generate";
  }
}

async function copyHTML(){
  if(!generatedHTML){
    document.getElementById("status").innerText = "Generate a website first.";
    return;
  }

  await navigator.clipboard.writeText(generatedHTML);
  document.getElementById("status").innerText = "HTML copied.";
}

function downloadHTML(){
  if(!generatedHTML){
    document.getElementById("status").innerText = "Generate a website first.";
    return;
  }

  const blob = new Blob([generatedHTML], { type:"text/html" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "index.html";
  a.click();

  URL.revokeObjectURL(url);
  document.getElementById("status").innerText = "index.html downloaded.";
}

fillExample();
</script>
</body>
</html>
